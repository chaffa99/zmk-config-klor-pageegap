# Force pure peripheral state
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_ZMK_SPLIT_PERIPHERAL=y

# Change the connection profile handling
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_COUNT=1
CONFIG_BT_MAX_PAIRED=3

# Turn off Central-only battery features that crash peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# Disable display/RGB processing on this side to prevent boot crashes
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_RGB_UNDERGLOW=n

# Force maximum radio signal
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_POINTING=y
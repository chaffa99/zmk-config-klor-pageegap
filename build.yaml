include:
  # 1. Left Peripheral Half
  - board: nice_nano_v2
    shield: klor_left_peripheral
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: klor_left

  # 2. Right Peripheral Half
  - board: nice_nano_v2
    shield: klor_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: klor_right

  # 3. Central Master Dongle (Prospector)
  - board: seeeduino_xiao_ble
    shield: klor_dongle;prospector_adapter
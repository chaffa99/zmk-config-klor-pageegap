# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#

include:
  # 1. Left Side compiled as a True Native Peripheral
  - board: nice_nano_v2
    shield: klor_left_peripheral
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: klor_left

  # 2. Right Side (Standard Native Peripheral)
  - board: nice_nano_v2
    shield: klor_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: klor_right

  # 3. Prospector Dongle
  - board: seeeduino_xiao_ble
    shield: klor_dongle;prospector_adapter